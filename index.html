<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Coop Rush — Panique au Rayon</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#0f172a;
    color:white;
    text-align:center;
}

h1{
    margin-top:20px;
}

#game{
    position:relative;
    width:800px;
    height:500px;
    background:#111827;
    margin:30px auto;
    overflow:hidden;
    border-radius:12px;
    border:2px solid #334155;
}

#player{
    position:absolute;
    bottom:10px;
    width:100px;
    height:20px;
    background:#22c55e;
    border-radius:8px;
}

.item{
    position:absolute;
    width:35px;
    height:35px;
    border-radius:8px;
}

.good{
    background:#38bdf8;
}

.bad{
    background:#ef4444;
}

#hud{
    width:800px;
    margin:auto;
    display:flex;
    justify-content:space-between;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:6px;
    background:#22c55e;
    color:black;
    font-weight:bold;
    cursor:pointer;
}

</style>
</head>

<body>

<h1>Coop Rush — Panique au Rayon</h1>

<div id="hud">
<div>Score : <span id="score">0</span></div>
<div>Vies : <span id="lives">3</span></div>
<div>Niveau : <span id="level">1</span></div>
</div>

<div id="game">
<div id="player"></div>
</div>

<button onclick="startGame()">Lancer la partie</button>

<script>

const game = document.getElementById("game")
const player = document.getElementById("player")

let playerX = 350
let score = 0
let lives = 3
let level = 1

let items = []

function updateHUD(){
    document.getElementById("score").innerText = score
    document.getElementById("lives").innerText = lives
    document.getElementById("level").innerText = level
}

function createItem(){

    const item = document.createElement("div")

    let bad = Math.random() < 0.25

    item.classList.add("item")
    item.classList.add(bad ? "bad" : "good")

    item.x = Math.random() * 760
    item.y = -40
    item.speed = 2 + level

    item.style.left = item.x + "px"
    item.style.top = item.y + "px"

    game.appendChild(item)

    items.push({
        element:item,
        bad:bad,
        x:item.x,
        y:item.y,
        speed:item.speed
    })

}

function updateItems(){

    items.forEach((obj,index)=>{

        obj.y += obj.speed

        obj.element.style.top = obj.y + "px"

        if(obj.y > 460){

            if(!obj.bad){
                score += 5
            }

            obj.element.remove()
            items.splice(index,1)

        }

        if(
            obj.y > 440 &&
            obj.x > playerX - 30 &&
            obj.x < playerX + 80
        ){

            if(obj.bad){
                lives--
            }else{
                score += 10
            }

            obj.element.remove()
            items.splice(index,1)

        }

    })

}

function updatePlayer(){

    player.style.left = playerX + "px"

}

function gameLoop(){

    updateItems()
    updatePlayer()
    updateHUD()

    if(score > level * 100){
        level++
    }

    if(lives <= 0){
        alert("Game Over ! Score : " + score)
        location.reload()
    }

}

function startGame(){

    setInterval(createItem,900)

    setInterval(gameLoop,30)

}

document.addEventListener("keydown",(e)=>{

    if(e.key==="ArrowLeft"){
        playerX -= 20
    }

    if(e.key==="ArrowRight"){
        playerX += 20
    }

    if(playerX < 0) playerX = 0
    if(playerX > 700) playerX = 700

})

</script>

</body>
</html>
